name: Negative comment monitor
run-name: Negative comment monitor (${{ github.event_name }})

on:
  workflow_dispatch:
    inputs:
      verify_anthropic:
        description: Verify Anthropic API key before monitoring
        required: false
        type: boolean
        default: false
  schedule:
    # 아침 일일 스캔: 09:10 직후 창(KST 09:13/09:26/09:39/09:52)에 여러 번 시도해
    # GitHub 크론 드롭/지연에도 스캔이 09:10 직후 확실히 걸리게 한다. 오프-라운드 분(혼잡 회피).
    # 첫 회차가 그날치를 처리하면 이후 회차는 멱등 스킵(비용 증가 없음).
    - cron: '13,26,39,52 0 * * *'
    # 상시 15분 웨이크: 부정 감지글 3h 집중확인 + 지연분 백업.
    - cron: '*/15 * * * *'

concurrency:
  group: negative-comment-monitor-production
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts
      - run: npm test
      - name: Verify Anthropic API key
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_anthropic }}
        run: node src/verify-anthropic.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
      - run: npm start
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          GAS_VERIFY_TOKEN: ${{ secrets.GAS_VERIFY_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_ASSIGNEE_SATELLITE: ${{ vars.SLACK_ASSIGNEE_SATELLITE }}
          SLACK_ASSIGNEE_VIRAL_BANNER: ${{ vars.SLACK_ASSIGNEE_VIRAL_BANNER }}
          SLACK_ASSIGNEE_VIRAL_VIDEO_OWNED: ${{ vars.SLACK_ASSIGNEE_VIRAL_VIDEO_OWNED }}
          SLACK_ASSIGNEE_OTHER: ${{ vars.SLACK_ASSIGNEE_OTHER }}
          SLACK_ASSIGNEE_SPONSORSHIP: ${{ vars.SLACK_ASSIGNEE_SPONSORSHIP }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_INSTAGRAM_ACTOR_ID: ${{ vars.APIFY_INSTAGRAM_ACTOR_ID }}
          APIFY_YOUTUBE_ACTOR_ID: ${{ vars.APIFY_YOUTUBE_ACTOR_ID }}
          APIFY_TIKTOK_ACTOR_ID: ${{ vars.APIFY_TIKTOK_ACTOR_ID }}
          APIFY_TWITTER_ACTOR_ID: ${{ vars.APIFY_TWITTER_ACTOR_ID }}
          APIFY_INSTAGRAM_INPUT_JSON: ${{ vars.APIFY_INSTAGRAM_INPUT_JSON }}
          APIFY_YOUTUBE_INPUT_JSON: ${{ vars.APIFY_YOUTUBE_INPUT_JSON }}
          APIFY_TIKTOK_INPUT_JSON: ${{ vars.APIFY_TIKTOK_INPUT_JSON }}
          APIFY_TWITTER_INPUT_JSON: ${{ vars.APIFY_TWITTER_INPUT_JSON }}
          SOURCE_SPREADSHEET_ID: ${{ vars.SOURCE_SPREADSHEET_ID }}
          SOURCE_SHEET_NAME: ${{ vars.SOURCE_SHEET_NAME }}
          EXCLUDED_CHANNEL_CATEGORY: ${{ vars.EXCLUDED_CHANNEL_CATEGORY }}
          MANAGED_CHANNEL_CATEGORIES: ${{ vars.MANAGED_CHANNEL_CATEGORIES }}
          TARGET_BATCH_SIZE: ${{ vars.TARGET_BATCH_SIZE }}
          TRACKING_DAYS: ${{ vars.TRACKING_DAYS }}
          DELTA_ENABLED: 'true'
          DRY_RUN: 'false'
      - name: Notify Slack on failure
        if: ${{ failure() }}
        continue-on-error: true
        run: node src/notify-failure.js
        env:
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ASSIGNEE_OTHER: ${{ vars.SLACK_ASSIGNEE_OTHER }}
          FAILURE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
